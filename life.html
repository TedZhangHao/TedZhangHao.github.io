<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hao Zhang | Life</title>

    <link rel="icon" type="image/x-icon" href="static/assets/Hao.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />
</head>

<body id="page-top" class="life-page">
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <div class="d-flex align-items-center gap-3">
                <a class="navbar-brand fw-bold" href="index.html">Hao Zhang</a>
                <a href="index.html">
                    <img id="logo" src="static/assets/img/jhu_logo.png" style="width: 2rem;" alt="JHU logo">
                </a>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html#page-top">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html#publications">PUBLICATIONS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html#patents">PATENTS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html#services">SERVICES</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html#awards">AWARDS</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="static/assets/CV.pdf" target="_blank">CV</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3" href="life.html">LIFE</a></li>
                </ul>
            </div>

            <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>
    </nav>

    <main class="life-main">
        <div class="container px-5">
            <section class="life-hero">
                <p class="life-kicker">Beyond Research</p>
                <h1 class="life-title">Life</h1>
                <p class="life-intro">Welcome to my life page 🌿</p>
                <p class="life-description">
                    This page is for sharing some moments beyond research — daily life, photos,
                    hobbies, travels, and small things I enjoy.
                </p>
            </section>

            <section class="life-section">
                <h2 class="life-section-title">Moments</h2>
                <div class="life-gallery">
                    <img src="static/assets/img/life1.jpg" alt="life photo 1">
                    <img src="static/assets/img/life2.jpg" alt="life photo 2">
                    <img src="static/assets/img/life3.jpg" alt="life photo 3">
                </div>
            </section>
        </div>
    </main>

    <script defer src="static/js/bootstrap.bundle.min.js"></script>

    <script>
        (function () {
            const body = document.body;
            const toggleBtn = document.getElementById("theme-toggle");
            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                body.classList.add("dark-mode");
                toggleBtn.textContent = "☀️";
            } else {
                toggleBtn.textContent = "🌙";
            }

            toggleBtn.addEventListener("click", function () {
                body.classList.toggle("dark-mode");
                const isDark = body.classList.contains("dark-mode");
                localStorage.setItem("theme", isDark ? "dark" : "light");
                toggleBtn.textContent = isDark ? "☀️" : "🌙";
            });
        })();
    </script>
</body>
</html>
